<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZephyrDevs | Shader Lines Demo</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel CDN for JSX Compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white m-0 overflow-hidden font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef } = React;

    function ShaderAnimation() {
      const containerRef = useRef(null);
      const sceneRef = useRef({
        camera: null,
        scene: null,
        renderer: null,
        uniforms: null,
        animationId: null,
      });

      useEffect(() => {
        // Load Three.js dynamically
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/89/three.min.js";
        script.onload = () => {
          if (containerRef.current && window.THREE) {
            initThreeJS();
          }
        };
        document.head.appendChild(script);

        return () => {
          // Cleanup
          if (sceneRef.current.animationId) {
            cancelAnimationFrame(sceneRef.current.animationId);
          }
          if (sceneRef.current.renderer) {
            sceneRef.current.renderer.dispose();
          }
          if (document.head.contains(script)) {
            document.head.removeChild(script);
          }
        };
      }, []);

      const initThreeJS = () => {
        if (!containerRef.current || !window.THREE) return;

        const THREE = window.THREE;
        const container = containerRef.current;

        // Clear any existing content
        container.innerHTML = "";

        // Initialize camera
        const camera = new THREE.Camera();
        camera.position.z = 1;

        // Initialize scene
        const scene = new THREE.Scene();

        // Create geometry
        const geometry = new THREE.PlaneBufferGeometry(2, 2);

        // Define uniforms
        const uniforms = {
          time: { type: "f", value: 1.0 },
          resolution: { type: "v2", value: new THREE.Vector2() },
        };

        // Vertex shader
        const vertexShader = `
          void main() {
            gl_Position = vec4( position, 1.0 );
          }
        `;

        // Fragment shader
        const fragmentShader = `
          #define TWO_PI 6.2831853072
          #define PI 3.14159265359

          precision highp float;
          uniform vec2 resolution;
          uniform float time;
            
          float random (in float x) {
              return fract(sin(x)*1e4);
          }
          float random (vec2 st) {
              return fract(sin(dot(st.xy,
                                   vec2(12.9898,78.233)))*
                  43758.5453123);
          }
          
          varying vec2 vUv;

          void main(void) {
            vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
            
            vec2 fMosaicScal = vec2(4.0, 2.0);
            vec2 vScreenSize = vec2(256,256);
            uv.x = floor(uv.x * vScreenSize.x / fMosaicScal.x) / (vScreenSize.x / fMosaicScal.x);
            uv.y = floor(uv.y * vScreenSize.y / fMosaicScal.y) / (vScreenSize.y / fMosaicScal.y);       
              
            float t = time*0.06+random(uv.x)*0.4;
            float lineWidth = 0.0008;

            vec3 color = vec3(0.0);
            for(int j = 0; j < 3; j++){
              for(int i=0; i < 5; i++){
                color[j] += lineWidth*float(i*i) / abs(fract(t - 0.01*float(j)+float(i)*0.01)*1.0 - length(uv));        
              }
            }

            gl_FragColor = vec4(color[2],color[1],color[0],1.0);
          }
        `;

        // Create material
        const material = new THREE.ShaderMaterial({
          uniforms: uniforms,
          vertexShader: vertexShader,
          fragmentShader: fragmentShader,
        });

        // Create mesh and add to scene
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Initialize renderer
        const renderer = new THREE.WebGLRenderer();
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Store references
        sceneRef.current = {
          camera,
          scene,
          renderer,
          uniforms,
          animationId: null,
        };

        // Handle resize
        const onWindowResize = () => {
          const rect = container.getBoundingClientRect();
          renderer.setSize(rect.width, rect.height);
          uniforms.resolution.value.x = renderer.domElement.width;
          uniforms.resolution.value.y = renderer.domElement.height;
        };

        onWindowResize();
        window.addEventListener("resize", onWindowResize, false);

        // Animation loop
        const animate = () => {
          sceneRef.current.animationId = requestAnimationFrame(animate);
          uniforms.time.value += 0.05;
          renderer.render(scene, camera);
        };

        animate();
      };

      return (
        <div
          ref={containerRef}
          className="w-full h-full absolute top-0 left-0 -z-10" 
        />
      );
    }

    function DemoOne() {
      return (
        <div className="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden bg-black text-white p-4">
          <ShaderAnimation />
          <span className="pointer-events-none z-10 text-center text-7xl leading-none font-semibold tracking-tighter whitespace-pre-wrap text-white drop-shadow-md">
            Shader Lines
          </span>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DemoOne />);
  </script>
</body>
</html>
